id = "rotemb-wond.copy-hints"
name = "Copy Hints"
version = "1.1.0"
min_herdr_version = "0.7.0"
description = "Copy paths, commits, URLs, and identifiers using in-pane keyboard hints"
platforms = ["linux", "macos"]

[[actions]]
id = "open"
title = "Show copy hints"
contexts = ["pane"]
command = ["python3", "open.py"]

[[panes]]
id = "hints"
title = "Copy hints"
placement = "overlay"
command = ["python3", "hints.py"]
